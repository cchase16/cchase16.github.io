<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Homepage</title>
  <style>
    :root {
      --bg: #05080d;
      --frame: #202b38;
      --terminal: #1e2b3a;
      --text: #d7dde7;
      --muted: #8f9aac;
      --green: #63d09a;
      --amber: #f0a437;
      --line: rgba(215, 221, 231, 0.12);
      --shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 18px 55px rgba(0,0,0,0.55);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #0c1018 0%, var(--bg) 58%);
      color: var(--text);
      font-family: Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    body {
      display: grid;
      place-items: center;
      padding: 36px 20px;
    }

    .shell-wrap {
      width: min(1180px, 100%);
      padding: 22px;
      border-radius: 34px;
      background: rgba(255,255,255,0.02);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 0 40px rgba(0,0,0,0.45);
    }

    .browser {
      background: var(--frame);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .browser-top {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      background: #263241;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .traffic {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      opacity: 0.95;
    }

    .dot.red { background: #ef6a5b; }
    .dot.yellow { background: #f4be4f; }
    .dot.green { background: #62c554; }

    .nav {
      color: #a6b0bf;
      display: flex;
      gap: 10px;
      font-size: 16px;
      line-height: 1;
      user-select: none;
    }

    .address {
      margin-left: auto;
      margin-right: auto;
      width: min(470px, 54vw);
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: #d9e0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .address .lock { opacity: 0.7; }
    .actions { color: #a6b0bf; display: flex; gap: 14px; font-size: 18px; }

    .terminal {
      position: relative;
      min-height: 760px;
      padding: 28px;
      background:
        radial-gradient(circle at 50% 40%, rgba(99,208,154,0.08), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--terminal);
      overflow: hidden;
    }

    .terminal::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 100% 3px;
      opacity: 0.3;
      pointer-events: none;
    }

    .center-stage {
      position: relative;
      min-height: 704px;
      display: grid;
      place-items: center;
    }

    .command-shell {
      width: min(860px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .prompt-card {
      width: min(720px, 100%);
      padding: 22px 24px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.025));
      box-shadow: 0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .terminal-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(16px, 2vw, 18px);
      font-weight: 600;
      flex-wrap: nowrap;
    }

    .terminal-label { white-space: nowrap; }
    .amber { color: var(--amber); }
    .green { color: var(--green); }

    .terminal-input-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      min-height: 28px;
    }

    .terminal-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font: inherit;
      caret-color: transparent;
      padding: 0;
      margin: 0;
    }

    .terminal-input::placeholder {
      color: rgba(174, 184, 198, 0.48);
    }

    .cursor-box {
      display: inline-block;
      width: 11px;
      height: 1.2em;
      background: var(--green);
      box-shadow: 0 0 10px rgba(99,208,154,0.25);
      animation: blink 1s steps(1) infinite;
      margin-left: 1px;
      flex: 0 0 auto;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.15; }
    }

    .tiles {
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .tiles.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .tile {
      appearance: none;
      width: 100%;
      text-align: left;
      padding: 18px 18px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.02));
      color: var(--text);
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.035), 0 10px 30px rgba(0,0,0,0.22);
    }

    .tile:hover,
    .tile:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(99,208,154,0.35);
      background: linear-gradient(180deg, rgba(99,208,154,0.08), rgba(255,255,255,0.03));
      box-shadow: 0 0 0 1px rgba(99,208,154,0.08), 0 14px 34px rgba(0,0,0,0.28);
      outline: none;
    }

    .tile-title {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .tile-meta {
      display: block;
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .status {
      min-height: 18px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.01em;
    }

    .status.error { color: #ff8a8a; }
    .status.success { color: var(--green); }

    @media (max-width: 760px) {
      body {
        display: block;
        padding: 0;
      }

      .shell-wrap {
        width: 100%;
        padding: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .browser {
        border-radius: 0;
        border-left: none;
        border-right: none;
      }

      .browser-top { gap: 10px; }

      .address {
        width: auto;
        flex: 1;
        min-width: 0;
      }

      .actions,
      .nav span:first-child,
      .nav span:nth-child(2) {
        display: none;
      }

      .terminal {
        min-height: calc(100vh - 58px);
        padding: 20px 16px;
      }

      .center-stage {
        min-height: calc(100vh - 98px);
      }

      .prompt-card {
        padding: 18px 16px;
        border-radius: 18px;
      }

      .terminal-input-row {
        font-size: 15px;
        align-items: flex-start;
      }

      .terminal-label {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="shell-wrap">
    <div class="browser">
      <div class="browser-top">
        <div class="traffic" aria-hidden="true">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <div class="nav" aria-hidden="true">
          <span>◧</span>
          <span>⌄</span>
          <span>‹</span>
          <span>›</span>
        </div>
        <div class="address">
          <span>🧑🏻</span>
          <span>terminal.chrischase.dev</span>
          <span class="lock">🔒</span>
        </div>
        <div class="actions" aria-hidden="true">
          <span>⤴</span>
          <span>＋</span>
        </div>
      </div>

      <main class="terminal">
        <div class="center-stage">
          <section class="command-shell" aria-label="Terminal launcher">
            <div class="prompt-card">
              <div class="terminal-input-row">
                <span class="terminal-label"><span class="amber">visitor</span><span class="green">@terminal.chrischase.dev</span>:~$</span>
                <div class="terminal-input-wrap">
                  <input
                    id="terminalInput"
                    class="terminal-input"
                    type="text"
                    spellcheck="false"
                    autocomplete="off"
                    autocapitalize="off"
                    placeholder="try: list"
                    aria-label="Terminal command line"
                  />
                  <span class="cursor-box" id="terminalCursor" aria-hidden="true"></span>
                </div>
              </div>
            </div>

            <div id="status" class="status" aria-live="polite"></div>
            <div id="projectTiles" class="tiles" aria-live="polite"></div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script>
    const input = document.getElementById('terminalInput');
    const cursor = document.getElementById('terminalCursor');
    const statusEl = document.getElementById('status');
    const tilesEl = document.getElementById('projectTiles');

    let projects = [];
    let projectsLoaded = false;

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function syncCursor() {
      const textWidth = input.value.length === 0 ? 0 : `${Math.max(input.value.length, 1)}ch`;
      input.style.width = textWidth;
      cursor.style.display = document.activeElement === input ? 'inline-block' : 'none';
    }

    function focusInputAtEnd() {
      input.focus({ preventScroll: true });
      const end = input.value.length;
      input.setSelectionRange(end, end);
      syncCursor();
    }

    function setStatus(message = '', type = '') {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function projectDisplayName(project) {
      return project.label || project.id || project.url;
    }

    async function loadProjectsFromXML() {
      if (projectsLoaded) return projects;

      const response = await fetch('siteconfig.xml', { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const xmlText = await response.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, 'application/xml');
      if (xml.querySelector('parsererror')) throw new Error('Invalid XML');

      projects = Array.from(xml.querySelectorAll('projects > project')).map((projectNode) => ({
        id: (projectNode.getAttribute('id') || '').trim(),
        label: (projectNode.querySelector('labelTxt')?.textContent || '').trim(),
        url: (projectNode.querySelector('url')?.textContent || '').trim()
      })).filter((project) => project.url);

      projectsLoaded = true;
      return projects;
    }

    function renderTiles() {
      if (!projects.length) {
        tilesEl.innerHTML = '';
        tilesEl.classList.remove('visible');
        setStatus('No projects found in siteconfig.xml.', 'error');
        return;
      }

      tilesEl.innerHTML = projects.map((project) => `
        <button class="tile" type="button" data-url="${escapeHTML(project.url)}" aria-label="Open ${escapeHTML(projectDisplayName(project))}">
          <span class="tile-title">${escapeHTML(projectDisplayName(project))}</span>
          <span class="tile-meta">${escapeHTML(project.url)}</span>
        </button>
      `).join('');

      tilesEl.classList.add('visible');
      setStatus(`${projects.length} project${projects.length === 1 ? '' : 's'} loaded.`, 'success');
    }

    async function handleCommand(command) {
      const normalized = command.trim().toLowerCase();
      if (!normalized) return;

      if (normalized !== 'list') {
        setStatus('Only one command is available: list', 'error');
        return;
      }

      setStatus('Loading projects…');
      try {
        await loadProjectsFromXML();
        renderTiles();
      } catch (error) {
        tilesEl.innerHTML = '';
        tilesEl.classList.remove('visible');
        setStatus('Could not load siteconfig.xml. Keep it in the same folder and serve over HTTP.', 'error');
      }
    }

    input.addEventListener('keydown', async (event) => {
      if (event.key === 'Enter') {
        const value = input.value;
        input.value = '';
        syncCursor();
        await handleCommand(value);
      }
    });

    input.addEventListener('input', syncCursor);
    input.addEventListener('focus', syncCursor);
    input.addEventListener('blur', syncCursor);

    tilesEl.addEventListener('click', (event) => {
      const tile = event.target.closest('[data-url]');
      if (!tile) return;
      const url = tile.getAttribute('data-url');
      if (url) window.location.href = url;
    });

    document.addEventListener('click', (event) => {
      if (event.target.closest('.tile')) return;
      focusInputAtEnd();
    });

    window.addEventListener('load', () => {
      focusInputAtEnd();
    });
  </script>
</body>
</html>
