<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Homepage</title>
  <style>
    :root {
      --bg: #05080d;
      --frame: #202b38;
      --terminal: #1e2b3a;
      --text: #d7dde7;
      --muted: #8f9aac;
      --green: #63d09a;
      --amber: #f0a437;
      --line: rgba(215, 221, 231, 0.12);
      --shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 18px 55px rgba(0,0,0,0.55);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #0c1018 0%, var(--bg) 58%);
      color: var(--text);
      font-family: Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    body {
      display: grid;
      place-items: center;
      padding: 36px 20px;
    }

    .shell-wrap {
      width: min(1180px, 100%);
      padding: 22px;
      border-radius: 34px;
      background: rgba(255,255,255,0.02);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 0 40px rgba(0,0,0,0.45);
    }

    .browser {
      background: var(--frame);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .browser-top {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      background: #263241;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .traffic {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      opacity: 0.95;
    }

    .dot.red { background: #ef6a5b; }
    .dot.yellow { background: #f4be4f; }
    .dot.green { background: #62c554; }

    .nav {
      color: #a6b0bf;
      display: flex;
      gap: 10px;
      font-size: 16px;
      line-height: 1;
      user-select: none;
    }

    .address {
      margin-left: auto;
      margin-right: auto;
      width: min(470px, 54vw);
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: #d9e0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .address .lock { opacity: 0.7; }
    .actions { color: #a6b0bf; display: flex; gap: 14px; font-size: 18px; }

    .terminal {
      position: relative;
      min-height: 760px;
      padding: 28px;
      background:
        radial-gradient(circle at 50% 40%, rgba(99,208,154,0.08), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--terminal);
      overflow: hidden;
    }

    .terminal::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 100% 3px;
      opacity: 0.3;
      pointer-events: none;
    }

    .center-stage {
      position: relative;
      min-height: 704px;
      display: grid;
      place-items: center;
    }

    .command-shell {
      width: min(960px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .prompt-card {
      width: min(560px, 100%);
      min-height: 84px;
      padding: 24px 28px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018));
      box-shadow: 0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }

    .prompt-card:focus-within {
      border-color: rgba(99,208,154,0.3);
      box-shadow: 0 0 0 1px rgba(99,208,154,0.08), 0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .prompt-card.error {
      border-color: rgba(239,106,91,0.45);
      animation: shake 180ms linear 1;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      50% { transform: translateX(3px); }
      75% { transform: translateX(-2px); }
      100% { transform: translateX(0); }
    }

    .terminal-input-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      font-size: clamp(18px, 2.2vw, 22px);
      font-weight: 500;
      position: relative;
    }

    .terminal-input-wrap {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
    }

    .terminal-input {
      width: 100%;
      text-align: center;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font: inherit;
      caret-color: var(--green);
      padding: 0;
      margin: 0;
    }

    .terminal-input::placeholder {
      color: rgba(174, 184, 198, 0.5);
    }

    .tiles {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .tiles.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .tile {
      appearance: none;
      width: 100%;
      text-align: left;
      padding: 16px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.02));
      color: var(--text);
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.035), 0 10px 30px rgba(0,0,0,0.22);
    }

    .tile:hover,
    .tile:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(99,208,154,0.35);
      background: linear-gradient(180deg, rgba(99,208,154,0.08), rgba(255,255,255,0.03));
      box-shadow: 0 0 0 1px rgba(99,208,154,0.08), 0 14px 34px rgba(0,0,0,0.28);
      outline: none;
    }

    .tile-thumb {
      width: 100%;
      aspect-ratio: 16 / 10;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      background: linear-gradient(135deg, rgba(99,208,154,0.16), rgba(255,255,255,0.04));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      display: block;
      margin-bottom: 14px;
    }

    .tile-thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .tile-title {
      display: block;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .mobile-tiles-mode .command-shell {
      gap: 20px;
    }

    .mobile-tiles-mode .prompt-card {
      display: none;
    }

    @media (max-width: 760px) {
      body {
        display: block;
        padding: 0;
      }

      .shell-wrap {
        width: 100%;
        padding: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .browser {
        border-radius: 0;
        border-left: none;
        border-right: none;
      }

      .browser-top { gap: 10px; }

      .address {
        width: auto;
        flex: 1;
        min-width: 0;
      }

      .actions,
      .nav span:first-child,
      .nav span:nth-child(2) {
        display: none;
      }

      .terminal {
        min-height: calc(100vh - 58px);
        padding: 20px 16px;
      }

      .center-stage {
        min-height: calc(100vh - 98px);
      }

      .prompt-card {
        width: 100%;
        min-height: 74px;
        padding: 18px 16px;
        border-radius: 18px;
      }

      .terminal-input-row {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="shell-wrap">
    <div class="browser">
      <div class="browser-top">
        <div class="traffic" aria-hidden="true">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <div class="nav" aria-hidden="true">
          <span>◧</span>
          <span>⌄</span>
          <span>‹</span>
          <span>›</span>
        </div>
        <div class="address">
          <span>🧑🏻</span>
          <span>terminal.chrischase.dev</span>
          <span class="lock">🔒</span>
        </div>
        <div class="actions" aria-hidden="true">
          <span>⤴</span>
          <span>＋</span>
        </div>
      </div>

      <main class="terminal">
        <div class="center-stage">
          <section class="command-shell" aria-label="Terminal launcher">
            <div class="prompt-card" id="promptCard">
              <div class="terminal-input-row">
                <div class="terminal-input-wrap">
                  <input
                    id="terminalInput"
                    class="terminal-input"
                    type="text"
                    spellcheck="false"
                    autocomplete="off"
                    autocapitalize="off"
                    placeholder="try : list"
                    aria-label="Terminal command line"
                  />
                </div>
              </div>
            </div>

            <div id="projectTiles" class="tiles" aria-live="polite"></div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script>
    const input = document.getElementById('terminalInput');
    const tilesEl = document.getElementById('projectTiles');
    const promptCard = document.getElementById('promptCard');

    let projects = [];
    let projectsLoaded = false;

    const placeholderSVG = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#2f4d4f"/>
            <stop offset="100%" stop-color="#1f2b38"/>
          </linearGradient>
        </defs>
        <rect width="800" height="500" fill="url(#g)"/>
        <rect x="40" y="40" width="720" height="420" rx="30" fill="none" stroke="rgba(255,255,255,0.14)"/>
        <circle cx="220" cy="190" r="55" fill="rgba(255,255,255,0.10)"/>
        <path d="M160 350 L300 240 L410 330 L520 220 L640 350 Z" fill="rgba(255,255,255,0.12)"/>
        <text x="400" y="420" text-anchor="middle" fill="#d7dde7" font-family="Menlo, Monaco, Consolas, monospace" font-size="34">Image coming soon</text>
      </svg>
    `);

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function isMobileDevice() {
      const coarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
      const narrowViewport = window.matchMedia && window.matchMedia('(max-width: 760px)').matches;
      const mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent || '');
      return mobileUA || (coarsePointer && narrowViewport);
    }

    function focusInput() {
      if (document.body.classList.contains('mobile-tiles-mode')) return;
      input.focus({ preventScroll: true });
      const end = input.value.length;
      input.setSelectionRange(end, end);
    }

    function flashPromptError() {
      promptCard.classList.remove('error');
      void promptCard.offsetWidth;
      promptCard.classList.add('error');
      setTimeout(() => promptCard.classList.remove('error'), 250);
    }

    function projectDisplayName(project) {
      return project.label || project.id || 'Untitled Project';
    }

    async function loadProjectsFromXML() {
      if (projectsLoaded) return projects;

      const response = await fetch('siteconfig.xml', { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const xmlText = await response.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, 'application/xml');
      if (xml.querySelector('parsererror')) throw new Error('Invalid XML');

      projects = Array.from(xml.querySelectorAll('projects > project')).map((projectNode) => ({
        id: (projectNode.getAttribute('id') || '').trim(),
        label: (projectNode.querySelector('labelTxt')?.textContent || '').trim(),
        url: (projectNode.querySelector('url')?.textContent || '').trim(),
        thumbnailImage: (projectNode.querySelector('thumbnailImage')?.textContent || '').trim().replace(/\\/g, '/'),
        okForMobile: /^yes$/i.test((projectNode.querySelector('okformobile, okForMobile')?.textContent || '').trim())
      })).filter((project) => project.url);

      projectsLoaded = true;
      return projects;
    }

    function renderTiles(projectList = projects) {
      if (!projectList.length) {
        tilesEl.innerHTML = '';
        tilesEl.classList.remove('visible');
        return;
      }

      tilesEl.innerHTML = projectList.map((project) => {
        const thumbSrc = project.thumbnailImage || `data:image/svg+xml;charset=UTF-8,${placeholderSVG}`;
        return `
        <button class="tile" type="button" data-url="${escapeHTML(project.url)}" aria-label="Open ${escapeHTML(projectDisplayName(project))}">
          <span class="tile-thumb" aria-hidden="true">
            <img src="${escapeHTML(thumbSrc)}" alt="" loading="lazy" onerror="this.onerror=null;this.src='data:image/svg+xml;charset=UTF-8,${placeholderSVG}'" />
          </span>
          <span class="tile-title">${escapeHTML(projectDisplayName(project))}</span>
        </button>
      `}).join('');

      tilesEl.classList.add('visible');
    }

    async function initializeMobileTilesMode() {
      if (!isMobileDevice()) return;

      document.body.classList.add('mobile-tiles-mode');
      promptCard.style.display = 'none';
      input.setAttribute('tabindex', '-1');
      input.blur();

      try {
        await loadProjectsFromXML();
        renderTiles(projects.filter((project) => project.okForMobile));
      } catch (error) {
        console.error('Unable to load mobile project tiles:', error);
      }
    }

    async function handleCommand(command) {
      const normalized = command.trim().toLowerCase();
      if (!normalized) return;

      if (normalized !== 'list') {
        flashPromptError();
        return;
      }

      try {
        await loadProjectsFromXML();
        renderTiles();
      } catch (error) {
        flashPromptError();
      }
    }

    input.addEventListener('keydown', async (event) => {
      if (event.key === 'Enter') {
        const value = input.value;
        input.value = '';
        await handleCommand(value);
      }
    });

    tilesEl.addEventListener('click', (event) => {
      const tile = event.target.closest('[data-url]');
      if (!tile) return;
      const url = tile.getAttribute('data-url');
      if (url) window.location.href = url;
    });

    document.addEventListener('click', (event) => {
      if (event.target.closest('.tile')) return;
      focusInput();
    });

    window.addEventListener('load', async () => {
      await initializeMobileTilesMode();
      focusInput();
    });
  </script>
</body>
</html>
