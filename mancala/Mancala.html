<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mancala</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0f172a;
    color: #e5eefc;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }
  h2 {
    margin: 0 0 18px;
    font-size: 30px;
    letter-spacing: 0.4px;
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    margin-bottom: 16px;
    max-width: 980px;
  }
  label {
    font-size: 14px;
    color: #cbd5e1;
  }
  button, select {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #f8fafc;
    font-size: 14px;
  }
  button:hover, select:hover {
    background: #273449;
  }
  .turn {
    margin: 10px 0 18px;
    font-weight: bold;
    font-size: 18px;
  }
  .boardWrap {
    width: min(980px, 100%);
    background: #111827;
    border: 1px solid #334155;
    border-radius: 22px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.28);
  }
  .sideLabel {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #dbeafe;
  }
  .sideLabel.bottom {
    margin-top: 14px;
    margin-bottom: 0;
    color: #dcfce7;
  }
  #board {
    display: grid;
    grid-template-columns: 110px repeat(6, minmax(84px, 1fr)) 110px;
    grid-template-rows: 96px 96px;
    gap: 14px;
    align-items: stretch;
    width: 100%;
  }
  .pit, .store {
    border: 0;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 96px;
    font-weight: 700;
    transition: transform 0.12s ease, filter 0.12s ease;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.08), 0 6px 16px rgba(0,0,0,0.2);
  }
  .pit {
    cursor: pointer;
  }
  .pit:hover {
    transform: translateY(-2px);
    filter: brightness(1.06);
  }
  .pit.player1 {
    background: linear-gradient(180deg, #2563eb, #1d4ed8);
    color: white;
  }
  .pit.player2 {
    background: linear-gradient(180deg, #16a34a, #15803d);
    color: white;
  }
  .pit.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .store {
    min-height: 206px;
    grid-row: span 2;
    background: linear-gradient(180deg, #334155, #1e293b);
    color: #f8fafc;
  }
  .pitLabel, .storeLabel {
    font-size: 12px;
    opacity: 0.9;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .count {
    font-size: 30px;
    line-height: 1;
  }
  #log {
    margin-top: 18px;
    width: min(980px, 100%);
    min-height: 140px;
    background: #020617;
    border: 1px solid #1e293b;
    padding: 12px 14px;
    overflow: auto;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.5;
    color: #cbd5e1;
  }
  @media (max-width: 820px) {
    .boardWrap { padding: 16px; }
    #board {
      grid-template-columns: 78px repeat(6, minmax(44px, 1fr)) 78px;
      grid-template-rows: 82px 82px;
      gap: 10px;
    }
    .pit, .store { border-radius: 14px; }
    .store { min-height: 174px; }
    .count { font-size: 24px; }
    .sideLabel { font-size: 16px; }
  }
</style>
</head>
<body>
  <h2>Mancala (Kalah)</h2>

  <div class="controls">
    <label for="p0">Player 1:</label>
    <select id="p0">
      <option value="human">Human</option>
      <option value="bot">Random Bot</option>
    </select>

    <label for="p1">Player 2:</label>
    <select id="p1">
      <option value="human">Human</option>
      <option value="bot">Random Bot</option>
    </select>

    <button id="start">Start Game</button>
    <button id="step">Step</button>
    <button id="auto">Auto</button>
    <button id="pause">Pause</button>
  </div>

  <div class="turn" id="turn"></div>

  <div class="boardWrap">
    <div class="sideLabel">Player 2 — Green Side</div>
    <div id="board"></div>
    <div class="sideLabel bottom">Player 1 — Blue Side</div>
  </div>

  <div id="log"></div>

<script>
const PITS = 6;
const START = 4;
let state;
let config;
let autoTimer = null;

function initState() {
  state = {
    board: [...Array(PITS).fill(START), 0, ...Array(PITS).fill(START), 0],
    turn: 0,
    gameOver: false
  };
}

function clone(s) {
  return JSON.parse(JSON.stringify(s));
}

function storeIndex(player) {
  return player === 0 ? PITS : 13;
}

function pitRange(player) {
  return player === 0 ? [0, 5] : [7, 12];
}

function opposite(i) {
  return 12 - i;
}

function legalMoves(s, player) {
  const [start, end] = pitRange(player);
  const moves = [];
  for (let i = start; i <= end; i++) {
    if (s.board[i] > 0) moves.push(i);
  }
  return moves;
}

function applyMove(s, pit) {
  let stones = s.board[pit];
  s.board[pit] = 0;
  let i = pit;

  while (stones > 0) {
    i = (i + 1) % 14;
    if (s.turn === 0 && i === 13) continue;
    if (s.turn === 1 && i === 6) continue;
    s.board[i]++;
    stones--;
  }

  const [ownStart, ownEnd] = pitRange(s.turn);
  if (i !== storeIndex(s.turn) && i >= ownStart && i <= ownEnd && s.board[i] === 1) {
    const opp = opposite(i);
    if (s.board[opp] > 0) {
      const store = storeIndex(s.turn);
      s.board[store] += s.board[opp] + 1;
      s.board[i] = 0;
      s.board[opp] = 0;
    }
  }

  if (i !== storeIndex(s.turn)) {
    s.turn = 1 - s.turn;
  }

  checkGameEnd(s);
}

function checkGameEnd(s) {
  const side0 = s.board.slice(0, 6).reduce((a, b) => a + b, 0);
  const side1 = s.board.slice(7, 13).reduce((a, b) => a + b, 0);

  if (side0 === 0 || side1 === 0) {
    s.gameOver = true;
    for (let i = 0; i < 6; i++) {
      s.board[6] += s.board[i];
      s.board[i] = 0;
    }
    for (let i = 7; i < 13; i++) {
      s.board[13] += s.board[i];
      s.board[i] = 0;
    }
  }
}

function randomBotMove(s, player) {
  const moves = legalMoves(s, player);
  return moves[Math.floor(Math.random() * moves.length)];
}

function currentPlayerType() {
  return state.turn === 0 ? config.p0 : config.p1;
}

function playerName(turnValue) {
  return turnValue === 0 ? 'Player 1' : 'Player 2';
}

function step() {
  if (state.gameOver) return;
  if (currentPlayerType() === 'bot') {
    const move = randomBotMove(clone(state), state.turn);
    log(`${playerName(state.turn)} bot plays pit ${displayPitNumber(move)}`);
    applyMove(state, move);
    render();
  }
}

function pitClick(i) {
  if (state.gameOver) return;
  if (currentPlayerType() !== 'human') return;
  if (!legalMoves(state, state.turn).includes(i)) return;
  log(`${playerName(state.turn)} plays pit ${displayPitNumber(i)}`);
  applyMove(state, i);
  render();
}

function displayPitNumber(index) {
  if (index >= 0 && index <= 5) return index + 1;
  if (index >= 7 && index <= 12) return 13 - index;
  return index;
}

function render() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  boardEl.appendChild(createStore(13, 'Player 2 Store'));
  for (let i = 12; i >= 7; i--) {
    boardEl.appendChild(createPit(i, 'player2'));
  }
  boardEl.appendChild(createStore(6, 'Player 1 Store'));

  for (let i = 0; i < 6; i++) {
    boardEl.appendChild(createPit(i, 'player1'));
  }

  document.getElementById('turn').innerText = state.gameOver
    ? winnerText()
    : `Turn: ${playerName(state.turn)}`;
}

function createPit(i, className) {
  const d = document.createElement('button');
  d.className = `pit ${className}`;
  const isCurrentPlayersPit = legalMoves(state, state.turn).includes(i) && !state.gameOver && currentPlayerType() === 'human';
  if (!isCurrentPlayersPit) d.classList.add('disabled');
  d.innerHTML = `<div class="pitLabel">Pit ${displayPitNumber(i)}</div><div class="count">${state.board[i]}</div>`;
  d.onclick = () => pitClick(i);
  return d;
}

function createStore(i, label) {
  const d = document.createElement('div');
  d.className = 'store';
  d.innerHTML = `<div class="storeLabel">${label}</div><div class="count">${state.board[i]}</div>`;
  return d;
}

function winnerText() {
  const p1 = state.board[6];
  const p2 = state.board[13];
  if (p1 > p2) return `Game Over — Player 1 wins (${p1} to ${p2})`;
  if (p2 > p1) return `Game Over — Player 2 wins (${p2} to ${p1})`;
  return `Game Over — Draw (${p1} to ${p2})`;
}

function log(text) {
  const logEl = document.getElementById('log');
  logEl.innerHTML += text + '<br>';
  logEl.scrollTop = logEl.scrollHeight;
}

function startGame() {
  config = {
    p0: document.getElementById('p0').value,
    p1: document.getElementById('p1').value
  };
  initState();
  document.getElementById('log').innerHTML = 'New game started.<br>';
  pause();
  render();
}

function autoPlay() {
  if (autoTimer) return;
  autoTimer = setInterval(() => {
    if (currentPlayerType() === 'bot') {
      step();
    }
  }, 450);
}

function pause() {
  clearInterval(autoTimer);
  autoTimer = null;
}

document.getElementById('start').onclick = startGame;
document.getElementById('step').onclick = step;
document.getElementById('auto').onclick = autoPlay;
document.getElementById('pause').onclick = pause;

startGame();
</script>
</body>
</html>
