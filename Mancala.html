<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mancala</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Mancala</h1>
        <p class="subtitle">Standard Kalah • 6 pits • 4 stones</p>
      </div>
      <div class="top-actions">
        <button id="newGameBtn" class="primary-btn">New Game</button>
      </div>
    </header>

    <main class="layout">
      <section class="board-panel card">
        <div class="board-header">
          <div>
            <div id="statusText" class="status-text">Loading…</div>
            <div id="turnText" class="turn-text"></div>
          </div>
          <div id="modeBadge" class="badge">Mode</div>
        </div>

        <div id="board" class="board" aria-label="Mancala board"></div>

        <div class="legend-row">
          <span><strong>Bottom side:</strong> Player 1</span>
          <span><strong>Top side:</strong> Player 2</span>
        </div>
      </section>

      <aside class="sidebar">
        <section class="card controls-card">
          <h2>Match Setup</h2>
          <div class="field-group">
            <label for="gameMode">Game Mode</label>
            <select id="gameMode">
              <option value="human-vs-human">Human vs Human</option>
              <option value="human-vs-bot">Human vs Bot</option>
              <option value="bot-vs-bot">Bot vs Bot</option>
            </select>
          </div>

          <div class="inline-buttons action-buttons">
            <button id="undoBtn">Undo Move</button>
            <button id="replayBtn">Replay</button>
          </div>

          <div id="botControls" class="bot-controls hidden">
            <div class="field-group">
              <label for="botSpeed">Bot Speed</label>
              <input id="botSpeed" type="range" min="150" max="1500" step="50" value="500" />
              <div id="botSpeedLabel" class="small-note">500 ms per move</div>
            </div>
            <div class="inline-buttons">
              <button id="pauseResumeBtn">Pause</button>
              <button id="stepBtn">Step</button>
            </div>
          </div>
        </section>

        <section class="card controls-card">
          <h2>Player Information</h2>

          <div class="field-group">
            <label for="playerOneName">Player 1 Name</label>
            <input id="playerOneName" type="text" maxlength="32" placeholder="Player 1" />
          </div>

          <div class="field-group">
            <label for="playerOneBot">Player 1 Bot</label>
            <select id="playerOneBot"></select>
            <div class="small-note">Selectable only in Bot vs Bot.</div>
          </div>

          <div class="field-group">
            <label for="playerTwoName">Player 2 Name</label>
            <input id="playerTwoName" type="text" maxlength="32" placeholder="Player 2" />
          </div>

          <div class="field-group">
            <label for="playerTwoBot">Player 2 Bot</label>
            <select id="playerTwoBot"></select>
            <div class="small-note">Selectable in Human vs Bot and Bot vs Bot.</div>
          </div>
        </section>

        <section class="card score-card">
          <h2>Score</h2>
          <div class="score-grid">
            <div>
              <div class="score-label">Player 1 Store</div>
              <div id="p1StoreScore" class="score-value">0</div>
            </div>
            <div>
              <div class="score-label">Player 2 Store</div>
              <div id="p2StoreScore" class="score-value">0</div>
            </div>
          </div>
        </section>

        <section class="card log-card">
          <div class="card-head-row">
            <h2>Move Log</h2>
            <button id="clearLogBtn" class="ghost-btn">Clear</button>
          </div>
          <ol id="moveLog" class="move-log"></ol>
        </section>
      </aside>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
